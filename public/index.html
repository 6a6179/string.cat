<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="dark" />

  <title>string.cat</title>
  <meta
    name="description"
    content="Email, experiments, and the occasional tiny site."
  />

  <link rel="canonical" href="https://string.cat/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="string.cat" />
  <meta property="og:url" content="https://string.cat/" />
  <meta property="og:image" content="/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#0a0a0a" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles/site.css" />
</head>
<body>
  <main class="page">
    <header class="masthead">
      <h1 class="site-title">string.cat</h1>
      <p class="site-subtitle">cat string string cat.</p>
    </header>

    <section class="shell" aria-label="Interactive terminal">
      <div class="shell-header" aria-hidden="true">
        <div class="window-controls">
          <span></span><span></span><span></span>
        </div>

        <div class="shell-title-group">
          <div class="shell-title" id="shell-title">visitor@string.cat:~</div>
        </div>
      </div>

      <div class="shell-body" id="shell-body">
        <div
          class="history"
          id="history"
          role="log"
          aria-live="polite"
          aria-relevant="additions text"
        ></div>

        <form class="command-form" id="command-form" autocomplete="off">
          <label class="sr-only" for="command-input">Terminal command input</label>

          <div class="prompt">
            <span class="prompt-label" aria-hidden="true">
              <span class="prompt-user">visitor</span><span>@</span><span class="prompt-host">string.cat</span><span>:</span><span class="prompt-path" id="prompt-path">~</span><span>$</span>
            </span>

            <input
              id="command-input"
              class="command-input"
              name="command"
              type="text"
              spellcheck="false"
              autocorrect="off"
              autocapitalize="none"
              autocomplete="off"
              aria-label="Terminal command input"
              placeholder="help"
            />
          </div>
        </form>

        <noscript class="noscript">
          JavaScript is required for the interactive shell.
        </noscript>
      </div>
    </section>

    <footer class="footer">
      &copy; <span id="year"></span> string.cat
    </footer>
  </main>

  <script defer src="scripts/shell-data.js"></script>
  <script defer src="scripts/shell.js"></script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "string.cat",
      "url": "https://string.cat/",
      "inLanguage": "en"
    }
  </script>
</body>
</html>
