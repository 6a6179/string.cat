<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="dark" />

  <title>string.cat</title>
  <meta
    name="description"
    content="Personal domain. Mainly used for email and testing. Minimal public static page in English."
  />

  <link rel="canonical" href="https://string.cat/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="string.cat" />
  <meta property="og:url" content="https://string.cat/" />
  <meta property="og:image" content="/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#0a0a0a" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111315;
      --panel-top: #171a1d;
      --text: #d7d7d7;
      --muted: #8d939a;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --accent: #8edf8b;
      --accent-soft: rgba(142, 223, 139, 0.18);
      --danger: #ffb4ad;
      --danger-soft: rgba(255, 120, 120, 0.22);
      --shadow:
        0 20px 50px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.02);
      --radius: 18px;
      --maxw: 760px;
      --font:
        "IBM Plex Mono",
        "JetBrains Mono",
        "SFMono-Regular",
        "Cascadia Mono",
        "Menlo",
        "Consolas",
        monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body {
      --pad-top: 28px;
      --pad-bottom: 36px;

      font: 15.5px/1.6 var(--font);
      height: 100dvh;
      padding: var(--pad-top) 18px var(--pad-bottom);
      overflow: hidden;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
    }

    ::selection {
      background: rgba(142, 223, 139, 0.22);
      color: var(--text);
    }

    :focus-visible {
      outline: 2px solid rgba(142, 223, 139, 0.55);
      outline-offset: 2px;
    }

    .page {
      width: min(100%, var(--maxw));
      height: calc(100dvh - var(--pad-top) - var(--pad-bottom));
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 18px;
    }

    .masthead {
      display: grid;
      gap: 0.35rem;
      align-content: start;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .site-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .site-subtitle {
      margin: 0;
      color: var(--muted);
    }

    .shell {
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .shell-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      background: var(--panel-top);
      border-bottom: 1px solid var(--line);
    }

    .window-controls {
      display: inline-flex;
      gap: 0.45rem;
      flex: none;
    }

    .window-controls span {
      width: 0.72rem;
      height: 0.72rem;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.15);
    }

    .window-controls span:nth-child(1) { background: #ff5f56; }
    .window-controls span:nth-child(2) { background: #ffbd2e; }
    .window-controls span:nth-child(3) { background: #27c93f; }

    .shell-title {
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shell-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
    }

    .shell-body::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .shell-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .shell-body::-webkit-scrollbar-thumb {
      border-radius: 999px;
      border: 2px solid transparent;
      background: rgba(255, 255, 255, 0.12);
      background-clip: padding-box;
    }

    .history {
      display: grid;
      gap: 0.95rem;
    }

    .entry {
      min-width: 0;
    }

    .entry.error .output {
      color: var(--danger);
      border-left-color: var(--danger-soft);
    }

    .prompt {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      min-width: 0;
    }

    .prompt-label {
      flex: none;
      white-space: nowrap;
    }

    .prompt-user {
      color: var(--accent);
    }

    .prompt-host {
      color: #7fc8ff;
    }

    .command {
      min-width: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output {
      margin-top: 0.45rem;
      margin-left: 1rem;
      padding-left: 0.95rem;
      border-left: 1px solid var(--accent-soft);
    }

    .line,
    .output p {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .line + .line,
    .output p + p {
      margin-top: 0.28rem;
    }

    .command-form {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-top: 0;
    }

    .history:not(:empty) + .command-form {
      margin-top: 0.95rem;
    }

    .command-input {
      width: 100%;
      min-width: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      caret-color: var(--text);
      outline: none;
      -webkit-appearance: none;
    }

    .command-input::placeholder {
      color: rgba(255, 255, 255, 0.22);
    }

    .footer {
      padding-top: 0.85rem;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 520px) {
      body {
        --pad-top: 18px;
        --pad-bottom: 24px;
        padding: var(--pad-top) 14px var(--pad-bottom);
      }

      .page {
        height: calc(100dvh - var(--pad-top) - var(--pad-bottom));
        gap: 14px;
      }

      .shell-header,
      .shell-body {
        padding-left: 0.85rem;
        padding-right: 0.85rem;
      }

      .shell-body {
        padding-top: 0.85rem;
        padding-bottom: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div class="eyebrow">personal domain</div>
      <h1 class="site-title">string.cat</h1>
      <p class="site-subtitle">mail / testing / minimal static hosting</p>
    </header>

    <section class="shell" aria-label="Interactive terminal">
      <div class="shell-header" aria-hidden="true">
        <div class="window-controls">
          <span></span><span></span><span></span>
        </div>
        <div class="shell-title">~/string.cat</div>
      </div>

      <div class="shell-body" id="shell-body">
        <div class="history" id="history" role="log" aria-live="polite" aria-relevant="additions text"></div>

        <form class="command-form" id="command-form" autocomplete="off">
          <label class="sr-only" for="command-input">Terminal command input</label>

          <span class="prompt-label" aria-hidden="true">
            <span class="prompt-user">visitor</span><span class="prompt-host">@string.cat</span><span>:~$</span>
          </span>

          <input
            id="command-input"
            class="command-input"
            name="command"
            type="text"
            spellcheck="false"
            autocorrect="off"
            autocapitalize="none"
            autocomplete="off"
            aria-label="Terminal command input"
          />
        </form>
      </div>
    </section>

    <footer class="footer">
      © <span id="year"></span> string.cat
    </footer>
  </main>

  <script>
    (() => {
      const $ = (selector) => document.querySelector(selector);

      const body = $("#shell-body");
      const history = $("#history");
      const form = $("#command-form");
      const input = $("#command-input");

      $("#year").textContent = new Date().getFullYear();

      const state = {
        commandHistory: [],
        historyIndex: -1,
        draft: ""
      };

      const files = Object.freeze({
        "about.txt": {
          kind: "paragraphs",
          content: [
            "string.cat is a personal domain used mainly for email and as a testing environment."
          ]
        },
        "services.txt": {
          kind: "lines",
          content: [
            "email",
            "testing and experiments",
            "minimal static hosting"
          ]
        },
        "legal.txt": {
          kind: "paragraphs",
          content: [
            "Any use of this domain that violates the policies of the .cat registry — including spam, phishing, or similar abuse — is strictly prohibited."
          ]
        }
      });

      const result = {
        lines: (content) => ({ kind: "lines", content }),
        error: (content) => ({ kind: "error", content }),
        clear: () => ({ kind: "clear" }),
        empty: () => ({ kind: "empty" })
      };

      const commands = {
        help: {
          description: "show available commands",
          run() {
            const rows = Object.entries(commands).map(
              ([name, command]) => `${name.padEnd(6)} ${command.description}`
            );
            return result.lines(rows);
          }
        },

        ls: {
          description: "list available files",
          run() {
            return result.lines(Object.keys(files));
          }
        },

        cat: {
          description: "print a file",
          run(args) {
            if (args.length !== 1) {
              return result.error(["usage: cat <file>"]);
            }

            const file = files[args[0]];
            if (!file) {
              return result.error([`cat: ${args[0]}: No such file or directory`]);
            }

            return file;
          }
        },

        clear: {
          description: "clear terminal history",
          run() {
            return result.clear();
          }
        }
      };

      function scrollToBottom() {
        requestAnimationFrame(() => {
          body.scrollTop = body.scrollHeight;
        });
      }

      function focusInput() {
        input.focus();
        const end = input.value.length;
        input.setSelectionRange(end, end);
      }

      function resetHistoryNavigation() {
        state.historyIndex = -1;
        state.draft = "";
      }

      function parse(raw) {
        const trimmed = raw.trim();
        if (!trimmed) {
          return { trimmed: "", name: "", args: [] };
        }

        const [name, ...args] = trimmed.split(/\s+/);
        return { trimmed, name, args };
      }

      function execute(raw) {
        const { trimmed, name, args } = parse(raw);

        if (!trimmed) {
          return result.empty();
        }

        const command = commands[name];
        if (!command) {
          return result.error([
            `command not found: ${name}`,
            'type "help" to see available commands'
          ]);
        }

        return command.run(args);
      }

      function createLine(text) {
        const node = document.createElement("div");
        node.className = "line";
        node.textContent = text;
        return node;
      }

      function createPrompt(commandText) {
        const row = document.createElement("div");
        row.className = "prompt";

        const label = document.createElement("span");
        label.className = "prompt-label";
        label.innerHTML =
          '<span class="prompt-user">visitor</span><span class="prompt-host">@string.cat</span><span>:~$</span>';

        const command = document.createElement("span");
        command.className = "command";
        command.textContent = commandText;

        row.append(label, command);
        return row;
      }

      function createOutput(view) {
        const output = document.createElement("div");
        output.className = "output";

        if (view.kind === "paragraphs") {
          view.content.forEach((text) => {
            const p = document.createElement("p");
            p.textContent = text;
            output.append(p);
          });
          return output;
        }

        view.content.forEach((text) => {
          output.append(createLine(text));
        });

        return output;
      }

      function appendEntry(commandText, view, type = "") {
        const entry = document.createElement("div");
        entry.className = `entry ${type}`.trim();

        entry.append(createPrompt(commandText));

        if (view.kind !== "empty") {
          entry.append(createOutput(view));
        }

        history.append(entry);
        scrollToBottom();
      }

      function handleSubmit(event) {
        event.preventDefault();

        const raw = input.value;
        const trimmed = raw.trim();
        const view = execute(raw);

        if (trimmed) {
          state.commandHistory.push(trimmed);
        }

        resetHistoryNavigation();

        if (view.kind === "clear") {
          history.textContent = "";
          input.value = "";
          scrollToBottom();
          return;
        }

        const type = view.kind === "error" ? "error" : "";
        appendEntry(raw, view, type);
        input.value = "";
      }

      function handleHistoryNavigation(event) {
        if (!state.commandHistory.length) return;

        if (event.key === "ArrowUp") {
          event.preventDefault();

          if (state.historyIndex === -1) {
            state.draft = input.value;
            state.historyIndex = state.commandHistory.length - 1;
          } else if (state.historyIndex > 0) {
            state.historyIndex -= 1;
          }

          input.value = state.commandHistory[state.historyIndex];
          focusInput();
        }

        if (event.key === "ArrowDown") {
          event.preventDefault();

          if (state.historyIndex === -1) return;

          if (state.historyIndex < state.commandHistory.length - 1) {
            state.historyIndex += 1;
            input.value = state.commandHistory[state.historyIndex];
          } else {
            state.historyIndex = -1;
            input.value = state.draft;
          }

          focusInput();
        }

        if (event.key === "Escape") {
          input.value = "";
          resetHistoryNavigation();
        }

        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "l") {
          event.preventDefault();
          history.textContent = "";
        }
      }

      body.addEventListener("click", focusInput);
      form.addEventListener("submit", handleSubmit);
      input.addEventListener("keydown", handleHistoryNavigation);

      if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
        focusInput();
      }
    })();
  </script>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "string.cat",
      "url": "https://string.cat/",
      "inLanguage": "en"
    }
  </script>
</body>
</html>
